services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env          # provides GROQ_API_KEY
    environment:
      - DATABASE_URL=sqlite:////data/cerebro.db   # persisted in the volume below
    volumes:
      - cerebro_data:/data                         # SQLite DB survives restarts
      - hf_cache:/root/.cache/huggingface          # cache the embedding model
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"               # open http://localhost:5173

volumes:
  cerebro_data:
  hf_cache:
